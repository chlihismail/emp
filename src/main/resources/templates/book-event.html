<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout</title>
  <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://js.stripe.com/v3/"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-lg bg-white p-8 rounded-lg shadow-md">
    <!-- Header -->
    <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Checkout</h1>

    <!-- Event Summary -->
    <div class="bg-gray-50 p-4 rounded-md mb-6">
      <h2 class="text-lg font-medium text-gray-700">Event Summary</h2>
      <p class="text-sm text-gray-600">
        <span class="font-medium">Event: </span><span th:text="${event.title}"></span>
      </p>
      <p class="text-sm text-gray-600">
          <span class="font-medium">Date: </span> <span th:text="${event.date}"></span>
      </p>
      <p class="text-sm text-gray-600">
          <span class="font-medium">Time: </span> <span th:text="${event.time}"></span>
      </p>
      <p class="text-sm text-gray-600">
        <span class="font-medium">Capacity: </span> <span th:text="${event.capacity}"></span>
      </p>
      <p class="text-sm text-gray-600">
        <span class="font-medium">Total Price: </span><span th:text="${event.price}"></span> DH
      </p>
    </div>

    <!-- Checkout Form -->
    <form action="/checkout" method="POST" class="space-y-4">
      <!-- Name -->
      <div>
        <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
        <input 
          type="text" 
          id="name" 
          name="name"
          th:value="${userName}" 
          required 
          class="w-full mt-1 px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
          placeholder="John Doe"
        />
      </div>

      <!-- Email -->
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          th:value="${userEmail}" 
          required 
          class="w-full mt-1 px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
          placeholder="johndoe@example.com"
        />
      </div>

      <!-- Card Information -->
      <div>
        <label for="card-number" class="block text-sm font-medium text-gray-700">Card Number</label>
        <input 
          type="text" 
          id="card-number" 
          name="card-number" 
          required 
          class="w-full mt-1 px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
          placeholder="1234 5678 9012 3456"
        />
      </div>
      <div class="grid grid-cols-2 gap-4">
        <!-- Expiry -->
        <div>
          <label for="expiry" class="block text-sm font-medium text-gray-700">Expiry</label>
          <input 
            type="text" 
            id="expiry" 
            name="expiry" 
            required 
            class="w-full mt-1 px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
            placeholder="MM/YY"
          />
        </div>
        <!-- CVV -->
        <div>
          <label for="cvv" class="block text-sm font-medium text-gray-700">CVV</label>
          <input 
            type="text" 
            id="cvv" 
            name="cvv" 
            required 
            class="w-full mt-1 px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
            placeholder="123"
          />
        </div>
      </div>

      <button 
        type="submit"
        th:if="${remainingCapacity > 0}" 
        class="w-full px-6 py-3 text-white bg-blue-600 rounded-md hover:bg-blue-700 transition duration-300 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:ring-offset-2">
        Pay <span th:text="${event.price}"></span> <span> DH</span>
    </button>
       <button type=""
          th:if="${remainingCapacity <= 0}" 
        class="w-full px-6 py-3 text-white bg-red-600 rounded-md hover:bg-red-700 transition duration-300 focus:outline-none focus:ring-2 focus:ring-red-400 focus:ring-offset-2">
        Full! No places left.
    </button>
    </form>
  </div>
</body>
</html>
